kind = "web"
previewPath = "/"
title = "PIXEL01 — نظام محاسبي سحابي"
version = "1.0.0"
id = "artifacts/pixel01"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25585

[services.development]
run = "pnpm --filter @workspace/pixel01 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pixel01", "run", "build" ]
publicDir = "artifacts/pixel01/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25585"
BASE_PATH = "/"
